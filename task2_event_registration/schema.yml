openapi: 3.0.3
info:
  title: EventHub API
  version: 1.0.0
  description: API documentation for EventHub Event Registration System.
paths:
  /api/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/profile/:
    get:
      operationId: auth_profile_retrieve
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: auth_profile_update
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfile'
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: auth_profile_partial_update
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfile'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegister'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegister'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegister'
          description: ''
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/categories/:
    get:
      operationId: categories_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - categories
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
  /api/categories/{id}/:
    get:
      operationId: categories_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this category.
        required: true
      tags:
      - categories
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
  /api/events/:
    get:
      operationId: events_list
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: city
        schema:
          type: string
      - in: query
        name: date_from
        schema:
          type: string
          format: date
      - in: query
        name: date_to
        schema:
          type: string
          format: date
      - in: query
        name: is_free
        schema:
          type: boolean
      - in: query
        name: is_virtual
        schema:
          type: boolean
      - in: query
        name: max_price
        schema:
          type: number
      - in: query
        name: min_price
        schema:
          type: number
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - completed
          - draft
          - published
        description: |-
          * `draft` - Draft
          * `published` - Published
          * `cancelled` - Cancelled
          * `completed` - Completed
      tags:
      - events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventListList'
          description: ''
    post:
      operationId: events_create
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreateUpdate'
          description: ''
  /api/events/{slug}/:
    get:
      operationId: events_retrieve
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventDetail'
          description: ''
    put:
      operationId: events_update
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreateUpdate'
          description: ''
    patch:
      operationId: events_partial_update
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEventCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEventCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEventCreateUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreateUpdate'
          description: ''
    delete:
      operationId: events_destroy
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/events/{slug}/attendees/:
    get:
      operationId: events_attendees_retrieve
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreateUpdate'
          description: ''
  /api/events/{slug}/register/:
    post:
      operationId: events_register_create
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventCreateUpdate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreateUpdate'
          description: ''
  /api/events/{slug}/stats/:
    get:
      operationId: events_stats_retrieve
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreateUpdate'
          description: ''
  /api/events/{slug}/unregister/:
    delete:
      operationId: events_unregister_destroy
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/events/upcoming/:
    get:
      operationId: events_upcoming_retrieve
      tags:
      - events
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreateUpdate'
          description: ''
  /api/registrations/:
    get:
      operationId: registrations_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - registrations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRegistrationList'
          description: ''
    post:
      operationId: registrations_create
      tags:
      - registrations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationCreate'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationCreate'
          description: ''
  /api/registrations/{id}/:
    get:
      operationId: registrations_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this registration.
        required: true
      tags:
      - registrations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
          description: ''
    put:
      operationId: registrations_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this registration.
        required: true
      tags:
      - registrations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationCreate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationCreate'
          description: ''
    patch:
      operationId: registrations_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this registration.
        required: true
      tags:
      - registrations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedRegistrationCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedRegistrationCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedRegistrationCreate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationCreate'
          description: ''
    delete:
      operationId: registrations_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this registration.
        required: true
      tags:
      - registrations
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/registrations/mine/:
    get:
      operationId: registrations_mine_retrieve
      tags:
      - registrations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
          description: ''
  /api/registrations/ticket/{ticket_code}/:
    get:
      operationId: registrations_ticket_retrieve
      parameters:
      - in: path
        name: ticket_code
        schema:
          type: string
        required: true
      tags:
      - registrations
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
          description: ''
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 120
        slug:
          type: string
          maxLength: 140
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        color_hex:
          type: string
          maxLength: 7
        icon_emoji:
          type: string
          maxLength: 10
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    EventCreateUpdate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        category:
          type: integer
          nullable: true
        organizer:
          allOf:
          - $ref: '#/components/schemas/Organizer'
          readOnly: true
        banner_image:
          type: string
          format: uri
          nullable: true
        start_datetime:
          type: string
          format: date-time
        end_datetime:
          type: string
          format: date-time
        venue_name:
          type: string
          maxLength: 200
        venue_address:
          type: string
        city:
          type: string
          maxLength: 100
        country:
          type: string
          maxLength: 100
        is_virtual:
          type: boolean
        meeting_link:
          type: string
          format: uri
          maxLength: 200
        max_capacity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        ticket_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        status:
          $ref: '#/components/schemas/StatusFbbEnum'
        tags:
          type: array
          items:
            type: integer
      required:
      - description
      - end_datetime
      - id
      - organizer
      - start_datetime
      - title
    EventDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 220
          pattern: ^[-a-zA-Z0-9_]+$
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        organizer:
          allOf:
          - $ref: '#/components/schemas/Organizer'
          readOnly: true
        banner_image:
          type: string
          format: uri
          nullable: true
        start_datetime:
          type: string
          format: date-time
        end_datetime:
          type: string
          format: date-time
        city:
          type: string
          maxLength: 100
        country:
          type: string
          maxLength: 100
        is_virtual:
          type: boolean
        max_capacity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        ticket_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_free:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusFbbEnum'
        available_spots:
          type: string
          readOnly: true
        is_full:
          type: string
          readOnly: true
        description:
          type: string
        venue_name:
          type: string
          maxLength: 200
        venue_address:
          type: string
        meeting_link:
          type: string
          format: uri
          maxLength: 200
        tags:
          type: array
          items:
            $ref: '#/components/schemas/EventTag'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - available_spots
      - category
      - created_at
      - description
      - end_datetime
      - id
      - is_free
      - is_full
      - organizer
      - start_datetime
      - tags
      - title
      - updated_at
    EventList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 220
          pattern: ^[-a-zA-Z0-9_]+$
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        organizer:
          allOf:
          - $ref: '#/components/schemas/Organizer'
          readOnly: true
        banner_image:
          type: string
          format: uri
          nullable: true
        start_datetime:
          type: string
          format: date-time
        end_datetime:
          type: string
          format: date-time
        city:
          type: string
          maxLength: 100
        country:
          type: string
          maxLength: 100
        is_virtual:
          type: boolean
        max_capacity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        ticket_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_free:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusFbbEnum'
        available_spots:
          type: string
          readOnly: true
        is_full:
          type: string
          readOnly: true
      required:
      - available_spots
      - category
      - end_datetime
      - id
      - is_free
      - is_full
      - organizer
      - start_datetime
      - title
    EventTag:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 80
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
    Organizer:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
        bio:
          type: string
          readOnly: true
        profile_picture:
          type: string
          format: uri
          readOnly: true
          nullable: true
      required:
      - bio
      - id
      - profile_picture
      - username
    PaginatedCategoryList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedEventListList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/EventList'
    PaginatedRegistrationList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Registration'
    PatchedEventCreateUpdate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        category:
          type: integer
          nullable: true
        organizer:
          allOf:
          - $ref: '#/components/schemas/Organizer'
          readOnly: true
        banner_image:
          type: string
          format: uri
          nullable: true
        start_datetime:
          type: string
          format: date-time
        end_datetime:
          type: string
          format: date-time
        venue_name:
          type: string
          maxLength: 200
        venue_address:
